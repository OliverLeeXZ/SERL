<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">SERL logo</title>
  <desc id="desc">SERL wordmark with a simple feedback-to-action-credit mark.</desc>
  <defs>
    <linearGradient id="wordGradient" x1="350" y1="90" x2="820" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.52" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="markGradient" x1="78" y1="98" x2="285" y2="221" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.58" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="960" height="320" rx="36" fill="#f8fafc"/>

  <g filter="url(#shadow)">
    <rect x="80" y="76" width="250" height="166" rx="26" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/>

    <rect x="122" y="92" width="166" height="36" rx="18" fill="url(#markGradient)"/>
    <text x="205" y="115"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16"
          font-weight="800"
          text-anchor="middle"
          fill="#ffffff">Multi-Feedback</text>

    <path d="M238 134v24" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
    <path d="M227 148l11 11 11-11" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="113" y="176" width="22" height="32" rx="7" fill="#cbd5e1"/>
    <rect x="144" y="176" width="22" height="32" rx="7" fill="#cbd5e1"/>
    <rect x="183" y="171" width="34" height="42" rx="10" fill="#22c55e" stroke="#166534" stroke-width="4"/>
    <rect x="225" y="171" width="34" height="42" rx="10" fill="#22c55e" stroke="#166534" stroke-width="4"/>
    <rect x="267" y="171" width="34" height="42" rx="10" fill="#ef4444" stroke="#991b1b" stroke-width="4"/>
    <path d="M200 202v-18" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <path d="M192 191l8-8 8 8" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M242 202v-18" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <path d="M234 191l8-8 8 8" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M284 184v18" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <path d="M276 194l8 8 8-8" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="140" y="226"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14"
          font-weight="800"
          text-anchor="middle"
          fill="#64748b">CoT</text>
    <text x="242" y="226"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14"
          font-weight="800"
          text-anchor="middle"
          fill="#b45309">Action</text>
  </g>

  <g filter="url(#shadow)">
    <text x="365" y="184"
          font-family="Arial, Helvetica, sans-serif"
          font-size="128"
          font-weight="800"
          fill="url(#wordGradient)">SERL</text>
    <text x="372" y="228"
          font-family="Arial, Helvetica, sans-serif"
          font-size="23"
          font-weight="700"
          fill="#334155">SELECTIVE HINDSIGHT DISTILLATION</text>
  </g>
</svg>
